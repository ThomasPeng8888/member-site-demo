{% extends "pages/base.html" %}

{% block title %}會員優惠｜Aqua Member{% endblock %}

{% block content %}
<section class="rewards">
    <div class="section-title">
        <p>Rewards</p>
        <h1>會員專屬優惠</h1>
        <span>輕鬆累積點數，換一點海洋生活的驚喜。</span>
    </div>

    <div class="reward-grid">
        <div class="reward-card">
            <div class="reward-icon">☕</div>

            <p>館內咖啡廳限定，出示會員即可使用。</p>
            <strong>100 點兌換</strong>
        </div>

        <div class="reward-card">
            <div class="reward-icon">🎟️</div>
            <h3>門票折抵 50 元</h3>
            <p>下次入館購票時可直接折抵。</p>
            <strong>300 點兌換</strong>
        </div>

        <div class="reward-card">
            <div class="reward-icon">🐬</div>
            <h3>活動優先報名</h3>
            <p>熱門活動開放會員提前報名。</p>
            <strong>Silver 以上</strong>
        </div>
    </div>
</section>
{% endblock %}
